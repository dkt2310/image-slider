<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#111;
}

.slider{
    width:90%;
    max-width:900px;
    height:500px;
    position:relative;
    overflow:hidden;
    border-radius:10px;
}

.slides{
    width:100%;
    height:100%;
    position:relative;
}

.slide{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    display:none;
}

.slide.active{
    display:block;
}

.prev,
.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:#fff;
    border:none;
    padding:15px 20px;
    cursor:pointer;
    font-size:25px;
}

.prev{
    left:10px;
}

.next{
    right:10px;
}

.prev:focus,
.next:focus{
    background:black;
}

@media(max-width:768px){

    .slider{
        height:300px;
    }

    .prev,
    .next{
        padding:10px 15px;
        font-size:20px;
    }

}

    </style>
</head>
<body>

<div class="slider">

    <div class="slides">
        <img src="https://media.istockphoto.com/id/478627080/photo/evening-view-of-ama-dablam.jpg?s=612x612&w=0&k=20&c=GLKvtQt1JVoOB4yR2WI86_fYOmG8WObeZP_QV_gFG_0=" class="slide active">
        <img src="https://media.istockphoto.com/id/1453838542/photo/last-light-on-mount-sneffels.jpg?s=612x612&w=0&k=20&c=IBOZYpAjhV5hFEL8yKYmY2ZCyCaGEOrXR5VZI13NMRI=" class="slide">
        <img src="https://i.pinimg.com/originals/d3/45/11/d3451114ab4e1d55ead624930bcff60c.jpg" class="slide">
        <img src="https://hips.hearstapps.com/hmg-prod/images/alpe-di-siusi-sunrise-with-sassolungo-or-langkofel-royalty-free-image-1623254127.jpg" class="slide">
        <img src="https://cdn.magicdecor.in/com/2023/02/30001328/image-1681372718-2941.jpg" class="slide">
        <img src="https://static.vecteezy.com/system/resources/thumbnails/051/953/787/small/a-majestic-lion-rests-on-a-rock-under-dramatic-clouds-showcasing-its-powerful-presence-photo.jpg" class="slide">
        <img src="https://media.wired.com/photos/65caa6f6f553745750c04769/3:2/w_2560%2Cc_limit/elephant-congo-science-GettyImages-630005418.jpg" class="slide">
        <img src="https://t4.ftcdn.net/jpg/04/15/79/09/360_F_415790935_7va5lMHOmyhvAcdskXbSx7lDJUp0cfja.jpg" class="slide">
        <img src="https://media.cntraveler.com/photos/53d9bf256dec627b149ce9f7/master/pass/mei-xiang-giant-panda.jpg" class="slide">
        <img src="https://foyr.com/learn/wp-content/uploads/2019/03/home-garden-potted-plants.jpg" class="slide">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSEPiqF5kA1ppZ6EBoRj-ildaIbFSaC2-u8tw&s" class="slide">
        <img src="https://foyr.com/learn/wp-content/uploads/2019/03/best-home-garden-ideas.png" class="slide">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRGb0zIDQiS_g_e-ZbGUAI-gZ1Hm1W3-OukvA&s" class="slide">
        <img src="https://static.wixstatic.com/media/055605_65e20a7fcbc54e2e8720adfc2544c35e~mv2.jpg/v1/fill/w_572,h_324,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/taj_new_contant_edited.jpg" class="slide">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQPWBMwFUzTJCru8A3hZC_dJnhJaazIv8FaLA&s" class="slide">
    </div>

    <button class="prev">&#10094;</button>
    <button class="next">&#10095;</button>

</div>

<script>
    const slides = document.querySelectorAll(".slide");
const nextBtn = document.querySelector(".next");
const prevBtn = document.querySelector(".prev");

let index = 0;

function showSlide(i){

    slides.forEach(slide=>{
        slide.classList.remove("active");
    });

    slides[i].classList.add("active");
}

nextBtn.addEventListener("click",()=>{

    index++;

    if(index >= slides.length){
        index = 0;
    }

    showSlide(index);

});

prevBtn.addEventListener("click",()=>{

    index--;

    if(index < 0){
        index = slides.length - 1;
    }

    showSlide(index);

});



</script>

</body>
</html>
